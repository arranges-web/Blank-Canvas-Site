kind = "web"
previewPath = "/"
title = "Title Company Website"
version = "1.0.0"
id = "artifacts/title-company"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20236

[services.development]
run = "pnpm --filter @workspace/title-company run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/title-company", "run", "build" ]
serve = "static"
publicDir = "artifacts/title-company/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20236"
BASE_PATH = "/"
